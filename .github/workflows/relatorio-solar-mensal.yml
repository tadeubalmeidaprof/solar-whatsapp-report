name: Relatório solar mensal

on:
  workflow_dispatch:
    inputs:
      report_year_month:
        description: "Mês do relatório para teste, no formato YYYY-MM. Se vazio, usa o mês anterior."
        required: false
        default: ""

jobs:
  send-monthly-report:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Mostrar horário do runner
        run: |
          echo "UTC agora:"
          date -u
          echo "Brasil/Bahia agora:"
          TZ='America/Bahia' date
          echo "Evento GitHub:"
          echo "$GITHUB_EVENT_NAME"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enviar relatório solar mensal
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROWATT_PLANT_ID: ${{ secrets.GROWATT_PLANT_ID }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
          WHATSAPP_PHONE_2: ${{ secrets.WHATSAPP_PHONE_2 }}
          WHATSAPP_APIKEY_2: ${{ secrets.WHATSAPP_APIKEY_2 }}
          ENERGY_TARIFF: ${{ secrets.ENERGY_TARIFF }}
          AVERAGE_CONSUMPTION_KWH: ${{ secrets.AVERAGE_CONSUMPTION_KWH }}
          TUSD_FIO_B_KWH: ${{ secrets.TUSD_FIO_B_KWH }}
          FIO_B_PERCENTAGE: ${{ secrets.FIO_B_PERCENTAGE }}
          REPORT_YEAR_MONTH: ${{ github.event.inputs.report_year_month }}
        run: python send_monthly_report.py
