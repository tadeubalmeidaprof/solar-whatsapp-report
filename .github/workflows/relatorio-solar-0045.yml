name: Relatório solar diário 00h45

on:
  workflow_dispatch:



jobs:
  send-report:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Mostrar horário do runner
        run: |
          echo "UTC agora:"
          date -u
          echo "Brasil/Bahia agora:"
          TZ='America/Bahia' date
          echo "Evento GitHub:"
          echo "$GITHUB_EVENT_NAME"

      - name: Mostrar arquivo YAML ativo
        run: |
          echo "Arquivos dentro de .github/workflows:"
          ls -la .github/workflows
          echo "Conteúdo dos workflows:"
          cat .github/workflows/*.yml

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enviar relatório solar
        env:
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}
          GROWATT_PLANT_ID: ${{ secrets.GROWATT_PLANT_ID }}
          GROWATT_DEVICE_SN: ${{ secrets.GROWATT_DEVICE_SN }}
          GROWATT_SERVER_URL: ${{ secrets.GROWATT_SERVER_URL }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
          WHATSAPP_PHONE_2: ${{ secrets.WHATSAPP_PHONE_2 }}
          WHATSAPP_APIKEY_2: ${{ secrets.WHATSAPP_APIKEY_2 }}
          ENERGY_TARIFF: ${{ secrets.ENERGY_TARIFF }}
        run: python send_daily_report.py

      - name: Salvar geração mensal no Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}
          GROWATT_PLANT_ID: ${{ secrets.GROWATT_PLANT_ID }}
          GROWATT_DEVICE_SN: ${{ secrets.GROWATT_DEVICE_SN }}
          GROWATT_SERVER_URL: ${{ secrets.GROWATT_SERVER_URL }}
        run: python save_monthly_snapshot.py
