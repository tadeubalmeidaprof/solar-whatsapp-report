name: Enviar relatório solar no WhatsApp

on:
  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:

  # Roda automaticamente todo dia
  schedule:
    # 18:30 no Brasil, considerando UTC-3 = 21:30 UTC
    - cron: "30 21 * * *"

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enviar relatório solar
        env:
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}
          GROWATT_PLANT_ID: ${{ secrets.GROWATT_PLANT_ID }}
          GROWATT_DEVICE_SN: ${{ secrets.GROWATT_DEVICE_SN }}
          GROWATT_SERVER_URL: ${{ secrets.GROWATT_SERVER_URL }}
          ENERGY_TARIFF: ${{ secrets.ENERGY_TARIFF }}

          # Wappfly
          WAPPFLY_TOKEN: ${{ secrets.WAPPFLY_TOKEN }}
          WAPPFLY_TO: ${{ secrets.WAPPFLY_TO }}

        run: python send_daily_report.py
